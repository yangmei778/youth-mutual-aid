<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>互助青年 - 青年同城互助平台</title>
    <style>
      /* ── 全局弹窗 ── */
      .el-overlay{background:rgba(0,0,0,.5)!important}
      .el-overlay-dialog .el-dialog{border-radius:20px!important;box-shadow:0 20px 60px rgba(0,0,0,.3)!important}
      .el-dialog__header{padding:28px 28px 0!important}
      .el-dialog__title{font-size:18px!important;font-weight:700!important}
      .el-dialog__body{padding:16px 28px 20px!important}
      .el-dialog__footer{padding:0 28px 24px!important}

      /* ── 确认框 ── */
      .el-message-box{border-radius:20px!important;box-shadow:0 20px 60px rgba(0,0,0,.3)!important}
      .el-message-box__header{padding:28px 28px 0!important}
      .el-message-box__title{font-size:18px!important;font-weight:700!important}
      .el-message-box__content{padding:12px 28px!important}
      .el-message-box__btns{padding:8px 28px 28px!important;text-align:center!important}
      .el-message-box__btns .el-button{border-radius:10px!important;min-width:90px!important;height:38px!important;font-weight:600!important}

      /* ── 表格 ── */
      .el-table th.el-table__cell{background:#f8f9fb!important;font-weight:700!important;border:none!important}
      .el-table{border-radius:14px;overflow:hidden}

      /* ── 标签 ── */
      .el-tag{border-radius:8px!important;font-weight:600!important}
      .el-button{border-radius:10px!important}
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
